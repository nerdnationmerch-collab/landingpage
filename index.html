<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nerd Nation</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    .noise {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 4px 4px;
      opacity: 0.15;
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 196, 0, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 196, 0, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 4vw 2vw;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    .left {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      width: fit-content;
    }

    .logo {
      width: min(22vw, 260px);
      filter: drop-shadow(0 0 25px rgba(255, 191, 0, 0.35));
      transform: rotate(-2deg);
      display: block;
    }

    .tagline {
      margin-top: 18px;
      width: 100%;
      text-align: justify;
      text-align-last: justify;
      font-size: clamp(1rem, 1.8vw, 1.8rem);
      font-weight: 900;
      color: #ffc400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding-left: 4px;
    }

    .right {
      flex: 0 0 auto;
      margin-left: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      gap: 18px;
    }

    .description {
      font-size: clamp(1.1rem, 1.8vw, 2rem);
      line-height: 1.5;
      font-weight: 500;
      color: #f5f5f5;
      max-width: 460px;
    }

    .highlight {
      color: #ffc400;
      font-weight: 900;
    }

    .drop {
      align-self: flex-start;
      position: relative;
      white-space: nowrap;
      font-size: clamp(0.95rem, 1.2vw, 1.15rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffc400;
      border: 2px solid #ffc400;
      padding: 12px 22px;
      border-radius: 999px;
      box-shadow: 0 0 20px rgba(255, 196, 0, 0.25);
      animation: pulse 2s infinite ease-in-out;
    }

    .floating-circle {
      position: absolute;
      width: 250px;
      height: 250px;
      border: 2px solid rgba(255, 196, 0, 0.08);
      border-radius: 50%;
      top: -50px;
      right: -50px;
    }

    .floating-square {
      position: absolute;
      width: 140px;
      height: 140px;
      border: 2px solid rgba(255, 196, 0, 0.08);
      transform: rotate(25deg);
      bottom: 10%;
      left: 5%;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.04);
      }
      100% {
        transform: scale(1);
      }
    }

    .social {
      margin-top: 6px;
      font-size: 0.95rem;
      color: #d9d9d9;
      letter-spacing: 1px;
    }

    .social a {
      color: #ffc400;
      text-decoration: none;
      font-weight: 700;
      transition: opacity 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
    }

    .instagram-icon {
      width: 22px;
      height: 22px;
      stroke: #ffc400;
      stroke-width: 2;
      fill: none;
    }

    .social a:hover {
      opacity: 0.75;
    }

    @media (max-width: 900px) {
      body {
        overflow: hidden;
        height: 100vh;
      }

      .container {
        height: 100vh;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        padding: 5vh 24px;
        gap: 0;
      }

      .left {
        height: 33vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .right {
        height: 67vh;
        width: 100%;
        margin-left: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;
        gap: 0;
      }

      .logo {
        width: 62vw;
        max-width: 240px;
      }

      .tagline {
        text-align: center;
        text-align-last: center;
        width: auto;
        letter-spacing: 0.08em;
        padding-left: 0;
        margin-top: 14px;
      }

      .description {
        text-align: center;
        font-size: 1.25rem;
        line-height: 1.5;
        max-width: 320px;
        margin: 0 auto;
      }

      .drop {
        align-self: center;
        font-size: 0.82rem;
        letter-spacing: 2px;
        padding: 10px 18px;
        white-space: nowrap;
      }

      .social {
        text-align: center;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="noise"></div>
  <div class="grid"></div>

  <div class="floating-circle"></div>
  <div class="floating-square"></div>

  <div class="container">

    <div class="left">
      <img src="nerdnation-logo.png" alt="Nerd Nation Logo" class="logo">
      <div class="tagline">#FlexYourVibe</div>
    </div>

    <div class="right">
      <div class="description">
        We all love <span class="highlight">pop culture</span>.<br>
        Flex your fandom with pride.
      </div>

      <div class="drop">
        First Drop Coming Soon ⚡
      </div>

      <div class="social">
        For more updates, follow us 
        <a href="https://www.instagram.com/nerdnation.merch/" target="_blank" aria-label="Instagram">
          <svg class="instagram-icon" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="1"></circle>
          </svg>
        </a>
      </div>
    </div>

  </div>

</body>
</html>
